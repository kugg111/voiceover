name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-test:
    # Client/Client.Tests target net8.0-windows (WPF) and need the Windows
    # Desktop workload, which only windows-latest runners have preinstalled.
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Voiceover.sln

      - name: Build
        run: dotnet build Voiceover.sln --configuration Release --no-restore

      - name: Test Server.Tests
        run: dotnet test Server.Tests/Server.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Test Client.Tests
        run: dotnet test Client.Tests/Client.Tests.csproj --configuration Release --no-build --verbosity normal

  # Linux client plan - see that plan for the full phase breakdown.
  # LinuxSmokeTest (Phase 0's first task) proves Livekit.Rtc.Dotnet's
  # native FFI layer (liblivekit_ffi.so) actually loads and initializes on
  # linux-x64. It's a throwaway project, not part of Voiceover.sln -
  # deleted or promoted once that question stays answered. Set
  # LIVEKIT_URL/LIVEKIT_API_KEY/LIVEKIT_API_SECRET as repo secrets for a
  # full real-connect check; without them this still proves the native
  # layer loads (a connect failure is fine, a load-time crash is not - see
  # LinuxSmokeTest/Program.cs).
  #
  # Client.Linux (Phase 1's real Avalonia UI project, IS part of
  # Voiceover.sln - also built on windows-latest above, this step is the
  # actual linux-x64 cross-check) gets its own build step below.
  linux-livekit-smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Run LiveKit smoke test
        run: dotnet run --project LinuxSmokeTest/LinuxSmokeTest.csproj -c Release
        env:
          LIVEKIT_URL: ${{ secrets.LIVEKIT_URL }}
          LIVEKIT_API_KEY: ${{ secrets.LIVEKIT_API_KEY }}
          LIVEKIT_API_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}

      - name: Build Client.Core for linux-x64
        run: dotnet build Client.Core/Client.Core.csproj --configuration Release

      - name: Build Client.Linux (Avalonia UI) for linux-x64
        run: dotnet build Client.Linux/Client.Linux.csproj --configuration Release -r linux-x64 --self-contained false
